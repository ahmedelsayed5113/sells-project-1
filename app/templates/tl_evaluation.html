{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="tl_eval.title"></h1>
    <p class="page-subtitle" data-i18n="tl_eval.subtitle"></p>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <input type="month" id="month" onchange="loadAll()">
  </div>
  <div class="field">
    <label data-i18n="filters.team"></label>
    <select id="teamFilter" onchange="render()">
      <option value="" data-i18n="common.all"></option>
      <option value="none" data-i18n="filters.no_team"></option>
    </select>
  </div>
  <div class="field">
    <label data-i18n="common.filter"></label>
    <select id="statusFilter" onchange="render()">
      <option value="" data-i18n="common.all"></option>
      <option value="done" data-i18n="tl_eval.evaluated"></option>
      <option value="pending" data-i18n="tl_eval.pending"></option>
    </select>
  </div>
  <div class="field" style="flex:1;min-width:180px">
    <label data-i18n="common.search"></label>
    <input type="text" id="searchBox" oninput="render()" data-i18n-placeholder="filters.search_user_ph">
  </div>
  <div class="field" style="align-self:flex-end">
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()" data-i18n="filters.reset"></button>
  </div>
  <div class="spacer"></div>
  <div id="progress" class="text-muted" style="font-size:13px;font-weight:600"></div>
</div>

<div id="chipsRow" class="pf-chips" style="margin-bottom:12px"></div>

<!-- Teams Performance row: ranking + composition donut -->
<div class="bento">
  <div class="chart-card span-8">
    <h3 data-i18n="tl_eval.teams_perf"></h3>
    <div id="chartTeamsRanking" class="plotly-container"></div>
  </div>
  <div class="chart-card span-4">
    <h3 data-i18n="tl_eval.teams_perf_hint"></h3>
    <div id="chartTeamsComposition" class="plotly-container"></div>
  </div>
</div>

<!-- Per-team aggregate cards -->
<div class="card reveal" id="teamsPerfCard">
  <div class="card-title">
    <span data-i18n="tl_eval.teams_perf"></span>
    <span class="text-muted" style="font-size:11px;margin-inline-start:8px" data-i18n="tl_eval.teams_perf_hint"></span>
  </div>
  <div id="teamsPerfGrid" class="pf-grid">
    <div class="pf-empty"><span class="loading"></span></div>
  </div>
</div>

<div class="card-title mb-2" style="margin-top:12px">
  <span data-i18n="tl_eval.title"></span>
</div>
<div id="list" class="stagger"></div>

<!-- Modal -->
<div class="modal-backdrop" id="evalModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal('evalModal')" data-i18n-aria-label="common.close">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEval()" data-i18n="tl_eval.save"></button>
      <button class="btn btn-ghost" onclick="closeModal('evalModal')" data-i18n="common.cancel"></button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
let leaders = [];
let teams = [];
let teamsPerf = [];
let currentTL = null;
let tlKpiData = null;

async function loadAll() {
  const month = document.getElementById("month").value;
  if (!month) return;
  try {
    const [ls, ts, tp] = await Promise.all([
      api(`/api/kpi/team-leaders?month=${month}`),
      teams.length ? Promise.resolve(teams) : api("/api/teams").catch(() => []),
      api(`/api/kpi/teams-summary?month=${month}`).catch(() => []),
    ]);
    leaders = ls;
    teams = ts || [];
    teamsPerf = tp || [];
    populateTeamFilter();
    renderTeamsCharts();
    renderTeamsPerf();
    render();
  } catch (e) { toastError(e); }
}

function scoreColorFromScore(score) {
  if (score >= 75) return "success";
  if (score >= 55) return "warn";
  return "danger";
}

function ratingFromScore(score) {
  if (score >= 90) return "Excellent";
  if (score >= 75) return "V.Good";
  if (score >= 55) return "Good";
  if (score >= 40) return "Medium";
  if (score >= 25) return "Weak";
  return "Bad";
}

function renderTeamsCharts() {
  if (typeof Plotly === 'undefined') return;
  if (!teamsPerf.length) {
    ["chartTeamsRanking","chartTeamsComposition"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<div class="empty-state" style="padding:40px">${t("tl_eval.no_teams_data")}</div>`;
    });
    return;
  }

  // Ranking horizontal bar
  const sorted = [...teamsPerf].sort((a,b) => (b.avg_member_score||0) - (a.avg_member_score||0));
  Charts.drawHorizontalBar("chartTeamsRanking", {
    x: sorted.map(p => p.avg_member_score || 0).reverse(),
    y: sorted.map(p => p.team_name).reverse(),
    colors: sorted.map(p => Charts.scoreColorHex(p.avg_member_score || 0)).reverse(),
    labels: sorted.map(p => (p.avg_member_score||0).toFixed(1) + "%").reverse(),
  });

  // Composition donut: total members per team
  Charts.drawDonut("chartTeamsComposition", {
    labels: teamsPerf.map(p => p.team_name),
    values: teamsPerf.map(p => p.member_count || 0),
    colors: teamsPerf.map((_, i) => Charts.PALETTE[i % Charts.PALETTE.length]),
  }, { centerText: teamsPerf.reduce((a,p) => a + (p.member_count||0), 0) + "" });
}

function renderTeamsPerf() {
  const host = document.getElementById("teamsPerfGrid");
  if (!host) return;
  if (!teamsPerf.length) {
    host.innerHTML = `<div class="pf-empty">${t("tl_eval.no_teams_data")}</div>`;
    return;
  }
  const maxScore = Math.max(1, ...teamsPerf.map(p => p.avg_member_score || 0));

  host.innerHTML = teamsPerf.map(p => {
    const score = Number(p.avg_member_score || 0);
    const col = scoreColorFromScore(score);
    const widthPct = Math.min(100, (score / maxScore) * 100);
    const submittedPct = p.member_count
      ? Math.round((p.members_evaluated / p.member_count) * 100)
      : 0;
    const ldScore = p.leader_score != null
      ? `<span class="text-${scoreColorFromScore(p.leader_score)}">${Number(p.leader_score).toFixed(1)}%</span>`
      : `<span class="text-muted">${t("tl_eval.pending")}</span>`;
    const top = p.top_performer
      ? `${escapeHTML(p.top_performer.name)} <span class="text-muted">(${p.top_performer.score}%)</span>`
      : `<span class="text-muted">—</span>`;
    const teamRating = localRating(score);
    return `<div class="surface-card team-perf-card">
      <div class="pf-card-head">
        <div>
          <div class="pf-card-title">
            <span class="rank ${p.rank===1?'r1':p.rank===2?'r2':p.rank===3?'r3':''}" style="margin-inline-end:6px">${p.rank}</span>
            ${escapeHTML(p.team_name)}
          </div>
          <div class="pf-card-sub">${t("tl_eval.tl")}: ${escapeHTML(p.leader_name || '—')} · ${ldScore}</div>
        </div>
        <span class="badge ${ratingClass(teamRating)}">${score.toFixed(1)}%</span>
      </div>

      <div>
        <div class="text-muted" style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:700;margin-bottom:6px">
          ${t("tl_eval.team_avg")}
        </div>
        <div class="bar"><div class="bar-fill ${col}" style="width:${widthPct}%"></div></div>
      </div>

      <div class="pf-card-meta">
        <span class="pf-pill"><span class="material-symbols-outlined pf-pill-icon" aria-hidden="true">groups</span>${p.member_count} ${t("tl_eval.members")}</span>
        <span class="pf-pill ${submittedPct >= 80 ? 'brand' : ''}"><span class="material-symbols-outlined pf-pill-icon" aria-hidden="true">check_circle</span>${p.members_evaluated}/${p.member_count} ${t("tl_eval.evaluated_short")}</span>
        ${p.total_leads ? `<span class="pf-pill"><span class="material-symbols-outlined pf-pill-icon" aria-hidden="true">inbox</span>${fmtNum(p.total_leads)} ${t("kpi.fresh_leads")}</span>` : ''}
        ${p.total_deals ? `<span class="pf-pill accent"><span class="material-symbols-outlined pf-pill-icon" aria-hidden="true">business_center</span>${p.total_deals} ${t("kpi.deals")}</span>` : ''}
        ${p.total_calls ? `<span class="pf-pill"><span class="material-symbols-outlined pf-pill-icon" aria-hidden="true">call</span>${fmtNum(p.total_calls)} ${t("kpi.calls")}</span>` : ''}
      </div>

      <div class="team-perf-top">
        <span class="material-symbols-outlined" aria-hidden="true">emoji_events</span>
        <span>${t("tl_eval.top_performer")}: ${top}</span>
      </div>
    </div>`;
  }).join("");
}

function populateTeamFilter() {
  const sel = document.getElementById("teamFilter");
  if (!sel) return;
  const prev = sel.value;
  const opts = [
    `<option value="">${t("common.all")}</option>`,
    `<option value="none">${t("filters.no_team")}</option>`,
  ];
  teams.forEach(team => {
    opts.push(`<option value="${team.id}">${escapeHTML(team.name)}</option>`);
  });
  sel.innerHTML = opts.join("");
  if (prev) sel.value = prev;
}

function resetFilters() {
  document.getElementById("teamFilter").value = "";
  document.getElementById("statusFilter").value = "";
  document.getElementById("searchBox").value = "";
  render();
}

function clearChip(id, val) {
  const el = document.getElementById(id);
  if (el) { el.value = val; render(); }
}

function renderChips() {
  const teamVal = document.getElementById("teamFilter").value;
  const statusVal = document.getElementById("statusFilter").value;
  const search = document.getElementById("searchBox").value.trim();
  const chips = [];
  if (teamVal) {
    let label = t("filters.no_team");
    if (teamVal !== "none") {
      const tm = teams.find(x => String(x.id) === teamVal);
      label = tm ? tm.name : teamVal;
    }
    chips.push(`<span class="pf-chip">${t("filters.team")}: ${escapeHTML(label)}<button onclick="clearChip('teamFilter','')">✕</button></span>`);
  }
  if (statusVal) {
    const lbl = statusVal === "done" ? t("tl_eval.evaluated") : t("tl_eval.pending");
    chips.push(`<span class="pf-chip">${t("common.filter")}: ${escapeHTML(lbl)}<button onclick="clearChip('statusFilter','')">✕</button></span>`);
  }
  if (search) {
    chips.push(`<span class="pf-chip">${t("common.search")}: ${escapeHTML(search)}<button onclick="clearChip('searchBox','')">✕</button></span>`);
  }
  document.getElementById("chipsRow").innerHTML = chips.join("");
}

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}

function render() {
  const month = document.getElementById("month").value;
  const teamVal = document.getElementById("teamFilter").value;
  const statusVal = document.getElementById("statusFilter").value;
  const search = (document.getElementById("searchBox").value || "").trim().toLowerCase();

  let rows = leaders.slice();
  if (teamVal === "none") rows = rows.filter(l => l.team_id == null);
  else if (teamVal) rows = rows.filter(l => String(l.team_id || "") === teamVal);
  if (statusVal === "done") rows = rows.filter(l => l.dataentry_submitted_at);
  else if (statusVal === "pending") rows = rows.filter(l => !l.dataentry_submitted_at);
  if (search) rows = rows.filter(l =>
    (l.full_name || "").toLowerCase().includes(search) ||
    (l.username || "").toLowerCase().includes(search) ||
    (l.team_name || "").toLowerCase().includes(search));

  const evaluated = leaders.filter(l => l.dataentry_submitted_at).length;
  document.getElementById("progress").textContent =
    `${t("tl_eval.progress")} ${evaluated} ${t("common.of")} ${leaders.length}  ·  ${t("filters.shown")} ${rows.length}`;

  renderChips();

  document.getElementById("list").innerHTML = rows.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon"><span class="material-symbols-outlined" aria-hidden="true">person_off</span></div><div>${t("tl_eval.no_tl")}</div></div>`
    : rows.map(l => {
        const done = !!l.dataentry_submitted_at;
        const teamName = l.team_name || t("tl_eval.no_team");
        const statusCls = done ? "badge-excellent" : "badge-pending";
        const statusTxt = done ? t("tl_eval.evaluated") : t("tl_eval.pending");
        const btnTxt = done ? t("tl_eval.edit") : t("tl_eval.evaluate");
        const teamPerf = teamsPerf.find(p => p.team_id === l.team_id);
        const teamScore = teamPerf ? teamPerf.avg_member_score : null;
        const teamScoreBadge = teamScore != null
          ? `<span class="badge ${ratingClass(localRating(teamScore))}" title="${t('tl_eval.team_avg')}">${t('tl_eval.team_avg')}: ${teamScore.toFixed(1)}%</span>`
          : "";
        return `
          <div class="card" style="margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
              <div class="avatar">${escapeHTML((l.full_name||"?")[0])}</div>
              <div style="flex:1">
                <div style="font-weight:700;font-size:15px">${escapeHTML(l.full_name)}</div>
                <div style="font-size:12px;color:var(--text-muted)">${escapeHTML(teamName)}</div>
              </div>
              ${teamScoreBadge}
              <span class="badge ${statusCls}">${statusTxt}</span>
              <button class="btn btn-sm btn-primary" onclick="openEval(${l.id}, '${escapeHTML(l.full_name)}', '${month}')">
                ${btnTxt}
              </button>
            </div>
          </div>`;
      }).join("");
}

async function openEval(tlId, tlName, month) {
  currentTL = { id: tlId, name: tlName, month };
  document.getElementById("modalTitle").textContent = tlName;
  document.getElementById("modalBody").innerHTML =
    `<div class="text-muted">${t("common.loading")}</div>`;
  openModal("evalModal");

  try {
    tlKpiData = await api(`/api/kpi/tl-kpi/${tlId}/${month}`).catch(() => null);
    const entry = tlKpiData ? tlKpiData.tl_entry : {};
    const autoSection = tlKpiData ? renderAutoSection(tlKpiData) : "";
    renderForm(entry, autoSection);

    // Draw radar chart in modal once rendered
    if (tlKpiData && tlKpiData.breakdown) {
      setTimeout(() => {
        const labels = Object.keys(tlKpiData.breakdown).map(k => t("kpi." + k));
        const values = Object.values(tlKpiData.breakdown).map(v => v.achievement_pct);
        const radarEl = document.getElementById("tlRadar");
        if (radarEl && typeof Plotly !== 'undefined') {
          Charts.drawRadarChart("tlRadar", { labels, values });
        }
      }, 80);
    }
  } catch (e) {
    renderForm({}, "");
  }
}

function renderAutoSection(data) {
  if (!data || !data.breakdown) return "";
  const autoKeys = ["calls", "meetings", "deals", "reservations", "followup_pct"];
  const rows = autoKeys.map(key => {
    const b = data.breakdown[key];
    if (!b) return "";
    const col = Charts.scoreColorHex(b.achievement_pct);
    return `<div class="kpi-row" style="grid-template-columns:1fr 2fr 1fr">
      <div class="kpi-label">${t("kpi." + key)}</div>
      <div class="kpi-bar-wrap"><div class="kpi-bar" style="width:${Math.min(b.achievement_pct,100)}%;background:${col}"></div></div>
      <div class="kpi-nums">
        <span class="actual">${b.actual}</span><span class="sep">/</span>
        <span class="target">${b.target}</span>
        <span class="pct">${b.achievement_pct}%</span>
      </div>
    </div>`;
  }).join("");

  const ratingTxt = data.rating ? t("rating." + data.rating) : "—";
  const score = (data.total_score || 0).toFixed(1);
  return `
    <div class="bento" style="margin-bottom:16px">
      <div class="span-7">
        <div class="form-section" style="margin:0">
          <div class="form-section-title">${t("tl_eval.team_auto")}</div>
          ${rows}
        </div>
      </div>
      <div class="span-5">
        <div class="form-section" style="margin:0;height:100%">
          <div class="form-section-title">${t("dash.metric_pillars")}</div>
          <div id="tlRadar" class="plotly-container short" style="min-height:240px"></div>
          <div class="text-center" style="margin-top:8px">
            <div style="font-size:24px;font-weight:800;font-family:Inter;color:var(--brand)">${score}%</div>
            <div class="text-muted" style="font-size:12px;font-weight:600">${ratingTxt}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderForm(entry, autoHtml) {
  const v = (key, def="0") => entry[key] !== undefined ? entry[key] : def;
  document.getElementById("modalBody").innerHTML = `
    ${autoHtml}
    <div class="form-section">
      <div class="form-section-title">${t("tl_eval.manual_fields")}</div>
      <div class="field-row">
        <div class="field">
          <label>${t("kpi.crm_own")} %</label>
          <input type="number" min="0" max="100" id="f_crm_pct" value="${v("crm_pct")}">
        </div>
        <div class="field">
          <label>${t("kpi.reports")}</label>
          <input type="number" min="0" id="f_reports" value="${v("reports")}">
        </div>
      </div>
      <div class="field">
        <label>${t("kpi.clients_pipeline")} %</label>
        <input type="number" min="0" max="100" id="f_clients_pipeline" value="${v("clients_pipeline")}">
      </div>

      <div class="form-section-title" style="margin-top:14px">${t("tl_eval.personal_eval")}</div>
      <div class="field-row">
        ${passfailField("f_attitude", t("kpi.attitude"), v("attitude"))}
        ${passfailField("f_presentation", t("kpi.presentation"), v("presentation"))}
      </div>
      <div class="field-row">
        ${passfailField("f_behaviour", t("kpi.behaviour"), v("behaviour"))}
        ${passfailField("f_appearance", t("kpi.appearance"), v("appearance"))}
      </div>
      <div class="field-row">
        ${passfailField("f_attendance_pct", t("kpi.attendance_pct"), v("attendance_pct"))}
        ${passfailField("f_hr_roles", t("kpi.hr_roles"), v("hr_roles"))}
      </div>
      <div class="field" style="margin-top:8px">
        <label>${t("tl_eval.notes")}</label>
        <textarea id="f_notes" rows="2" style="width:100%">${escapeHTML(entry.notes||"")}</textarea>
      </div>
    </div>`;
}

function passfailField(id, label, val) {
  const isPass = Number(val) === 100;
  return `
    <div class="field">
      <label>${label}</label>
      <div class="passfail-toggle" role="radiogroup" aria-label="${escapeHTML(label)}">
        <button type="button" role="radio" aria-checked="${isPass}" data-pf-target="${id}" data-pf-value="100" class="${isPass ? 'is-active' : ''}">${t("common.pass")}</button>
        <button type="button" role="radio" aria-checked="${!isPass}" data-pf-target="${id}" data-pf-value="0" class="${!isPass ? 'is-active' : ''}">${t("common.fail")}</button>
      </div>
      <input type="hidden" id="${id}" value="${isPass ? 100 : 0}">
    </div>`;
}

// Delegate clicks for any pass/fail segmented control rendered inside the modal.
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".passfail-toggle button[data-pf-target]");
  if (!btn) return;
  const id  = btn.getAttribute("data-pf-target");
  const val = btn.getAttribute("data-pf-value");
  const input = document.getElementById(id);
  if (input) input.value = val;
  btn.parentElement.querySelectorAll("button").forEach(b => {
    const active = b === btn;
    b.classList.toggle("is-active", active);
    b.setAttribute("aria-checked", active ? "true" : "false");
  });
});

async function saveEval() {
  if (!currentTL) return;
  const body = {
    user_id:          currentTL.id,
    month:            currentTL.month,
    crm_pct:          parseFloat(document.getElementById("f_crm_pct").value)||0,
    reports:          parseInt(document.getElementById("f_reports").value)||0,
    clients_pipeline: parseFloat(document.getElementById("f_clients_pipeline").value)||0,
    attitude:         parseInt(document.getElementById("f_attitude").value)||0,
    presentation:     parseInt(document.getElementById("f_presentation").value)||0,
    behaviour:        parseInt(document.getElementById("f_behaviour").value)||0,
    appearance:       parseInt(document.getElementById("f_appearance").value)||0,
    attendance_pct:   parseFloat(document.getElementById("f_attendance_pct").value)||0,
    hr_roles:         parseInt(document.getElementById("f_hr_roles").value)||0,
    notes:            document.getElementById("f_notes").value||"",
  };
  try {
    await api("/api/kpi/submit/tl-evaluation", { method:"POST", body });
    toast(t("common.saved"), "success");
    closeModal("evalModal");
    loadAll();
  } catch (e) { toastError(e); }
}

function onLangChange() { render(); }

const now = new Date();
document.getElementById("month").value =
  now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
loadAll();
</script>
{% endblock %}
