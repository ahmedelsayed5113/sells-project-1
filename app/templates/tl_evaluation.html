{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="tl_eval.title"></h1>
    <p class="page-subtitle" data-i18n="tl_eval.subtitle"></p>
  </div>
</div>

<div class="controls">
  <div class="field">
    <label data-i18n="common.month"></label>
    <input type="month" id="month" onchange="loadAll()">
  </div>
  <div class="field">
    <label data-i18n="filters.team"></label>
    <select id="teamFilter" onchange="render()">
      <option value="" data-i18n="common.all"></option>
      <option value="none" data-i18n="filters.no_team"></option>
    </select>
  </div>
  <div class="field">
    <label data-i18n="common.filter"></label>
    <select id="statusFilter" onchange="render()">
      <option value="" data-i18n="common.all"></option>
      <option value="done" data-i18n="tl_eval.evaluated"></option>
      <option value="pending" data-i18n="tl_eval.pending"></option>
    </select>
  </div>
  <div class="field" style="flex:1;min-width:180px">
    <label data-i18n="common.search"></label>
    <input type="text" id="searchBox" oninput="render()" data-i18n-placeholder="filters.search_user_ph">
  </div>
  <div class="field" style="align-self:flex-end">
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()" data-i18n="filters.reset"></button>
  </div>
  <div class="spacer"></div>
  <div id="progress" class="text-muted" style="font-size:13px"></div>
</div>

<div id="chipsRow" class="pf-chips" style="margin-bottom:12px"></div>

<div id="list" class="stagger"></div>

<!-- Modal -->
<div class="modal-backdrop" id="evalModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal('evalModal')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-primary hyper-btn" onclick="saveEval()" data-i18n="tl_eval.save"></button>
      <button class="btn btn-ghost" onclick="closeModal('evalModal')" data-i18n="common.cancel"></button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let leaders = [];
let teams = [];
let currentTL = null;
let tlKpiData = null;

async function loadAll() {
  const month = document.getElementById("month").value;
  if (!month) return;
  try {
    const [ls, ts] = await Promise.all([
      api(`/api/kpi/team-leaders?month=${month}`),
      teams.length ? Promise.resolve(teams) : api("/api/teams").catch(() => []),
    ]);
    leaders = ls;
    teams = ts || [];
    populateTeamFilter();
    render();
  } catch (e) { toastError(e); }
}

function populateTeamFilter() {
  const sel = document.getElementById("teamFilter");
  if (!sel) return;
  const prev = sel.value;
  const opts = [
    `<option value="">${t("common.all")}</option>`,
    `<option value="none">${t("filters.no_team")}</option>`,
  ];
  teams.forEach(team => {
    opts.push(`<option value="${team.id}">${escapeHTML(team.name)}</option>`);
  });
  sel.innerHTML = opts.join("");
  if (prev) sel.value = prev;
}

function resetFilters() {
  document.getElementById("teamFilter").value = "";
  document.getElementById("statusFilter").value = "";
  document.getElementById("searchBox").value = "";
  render();
}

function clearChip(id, val) {
  const el = document.getElementById(id);
  if (el) { el.value = val; render(); }
}

function renderChips() {
  const teamVal = document.getElementById("teamFilter").value;
  const statusVal = document.getElementById("statusFilter").value;
  const search = document.getElementById("searchBox").value.trim();
  const chips = [];
  if (teamVal) {
    let label = t("filters.no_team");
    if (teamVal !== "none") {
      const tm = teams.find(x => String(x.id) === teamVal);
      label = tm ? tm.name : teamVal;
    }
    chips.push(`<span class="pf-chip">${t("filters.team")}: ${escapeHTML(label)}<button onclick="clearChip('teamFilter','')">✕</button></span>`);
  }
  if (statusVal) {
    const lbl = statusVal === "done" ? t("tl_eval.evaluated") : t("tl_eval.pending");
    chips.push(`<span class="pf-chip">${t("common.filter")}: ${escapeHTML(lbl)}<button onclick="clearChip('statusFilter','')">✕</button></span>`);
  }
  if (search) {
    chips.push(`<span class="pf-chip">${t("common.search")}: ${escapeHTML(search)}<button onclick="clearChip('searchBox','')">✕</button></span>`);
  }
  document.getElementById("chipsRow").innerHTML = chips.join("");
}

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}

function render() {
  const month = document.getElementById("month").value;
  const teamVal = document.getElementById("teamFilter").value;
  const statusVal = document.getElementById("statusFilter").value;
  const search = (document.getElementById("searchBox").value || "").trim().toLowerCase();

  let rows = leaders.slice();
  if (teamVal === "none") rows = rows.filter(l => l.team_id == null);
  else if (teamVal) rows = rows.filter(l => String(l.team_id || "") === teamVal);
  if (statusVal === "done") rows = rows.filter(l => l.dataentry_submitted_at);
  else if (statusVal === "pending") rows = rows.filter(l => !l.dataentry_submitted_at);
  if (search) rows = rows.filter(l =>
    (l.full_name || "").toLowerCase().includes(search) ||
    (l.username || "").toLowerCase().includes(search) ||
    (l.team_name || "").toLowerCase().includes(search));

  const evaluated = leaders.filter(l => l.dataentry_submitted_at).length;
  document.getElementById("progress").textContent =
    `${t("tl_eval.progress")} ${evaluated} ${t("common.of")} ${leaders.length}  ·  ${t("filters.shown")} ${rows.length}`;

  renderChips();

  document.getElementById("list").innerHTML = rows.length === 0
    ? `<div class="empty-state"><div>${t("tl_eval.no_tl")}</div></div>`
    : rows.map(l => {
        const done = !!l.dataentry_submitted_at;
        const teamName = l.team_name || t("tl_eval.no_team");
        const statusCls = done ? "badge-excellent" : "badge-pending";
        const statusTxt = done ? t("tl_eval.evaluated") : t("tl_eval.pending");
        const btnTxt = done ? t("tl_eval.edit") : t("tl_eval.evaluate");
        return `
          <div class="card" style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
              <div class="avatar">${escapeHTML((l.full_name||"?")[0])}</div>
              <div style="flex:1">
                <div style="font-weight:600">${escapeHTML(l.full_name)}</div>
                <div style="font-size:12px;color:var(--text-muted)">${escapeHTML(teamName)}</div>
              </div>
              <span class="badge ${statusCls}">${statusTxt}</span>
              <button class="btn btn-sm btn-primary hyper-btn" onclick="openEval(${l.id}, '${escapeHTML(l.full_name)}', '${month}')">
                ${btnTxt}
              </button>
            </div>
          </div>`;
      }).join("");
}

async function openEval(tlId, tlName, month) {
  currentTL = { id: tlId, name: tlName, month };
  document.getElementById("modalTitle").textContent = tlName;
  document.getElementById("modalBody").innerHTML =
    `<div class="text-muted">${t("common.loading")}</div>`;
  openModal("evalModal");

  try {
    tlKpiData = await api(`/api/kpi/tl-kpi/${tlId}/${month}`).catch(() => null);
    const entry = tlKpiData ? tlKpiData.tl_entry : {};
    const autoSection = tlKpiData ? renderAutoSection(tlKpiData) : "";
    renderForm(entry, autoSection);
  } catch (e) {
    renderForm({}, "");
  }
}

function renderAutoSection(data) {
  if (!data || !data.breakdown) return "";
  const lang = getLang();
  const autoKeys = ["calls", "meetings", "deals", "reservations", "followup_pct"];
  const rows = autoKeys.map(key => {
    const b = data.breakdown[key];
    if (!b) return "";
    const lbl = t("kpi." + key);
    const col = b.achievement_pct >= 90 ? "var(--brand-2)" : b.achievement_pct >= 70 ? "var(--warning)" : "var(--danger)";
    return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span>${lbl}</span>
      <span style="color:${col}">${b.actual} / ${b.target} (${b.achievement_pct}%)</span>
    </div>`;
  }).join("");
  return `
    <div class="form-section" style="margin-bottom:16px">
      <div class="form-section-title">${t("tl_eval.team_auto")}</div>
      ${rows}
    </div>`;
}

function renderForm(entry, autoHtml) {
  const v = (key, def="0") => entry[key] !== undefined ? entry[key] : def;
  document.getElementById("modalBody").innerHTML = `
    ${autoHtml}
    <div class="form-section">
      <div class="form-section-title">${t("tl_eval.manual_fields")}</div>
      <div class="field-row">
        <div class="field">
          <label>${t("kpi.crm_own")} %</label>
          <input type="number" min="0" max="100" id="f_crm_pct" value="${v("crm_pct")}">
        </div>
        <div class="field">
          <label>${t("kpi.reports")}</label>
          <input type="number" min="0" id="f_reports" value="${v("reports")}">
        </div>
      </div>
      <div class="field">
        <label>${t("kpi.clients_pipeline")} %</label>
        <input type="number" min="0" max="100" id="f_clients_pipeline" value="${v("clients_pipeline")}">
      </div>

      <div class="form-section-title" style="margin-top:12px">${t("tl_eval.personal_eval")}</div>
      <div class="field-row">
        ${passfailField("f_attitude", t("kpi.attitude"), v("attitude"))}
        ${passfailField("f_presentation", t("kpi.presentation"), v("presentation"))}
      </div>
      <div class="field-row">
        ${passfailField("f_behaviour", t("kpi.behaviour"), v("behaviour"))}
        ${passfailField("f_appearance", t("kpi.appearance"), v("appearance"))}
      </div>
      <div class="field-row">
        ${passfailField("f_attendance_pct", t("kpi.attendance_pct"), v("attendance_pct"))}
        ${passfailField("f_hr_roles", t("kpi.hr_roles"), v("hr_roles"))}
      </div>
      <div class="field" style="margin-top:8px">
        <label>${t("tl_eval.notes")}</label>
        <textarea id="f_notes" rows="2" style="width:100%">${escapeHTML(entry.notes||"")}</textarea>
      </div>
    </div>`;
}

function passfailField(id, label, val) {
  return `
    <div class="field">
      <label>${label}</label>
      <select id="${id}">
        <option value="100" ${val==100?"selected":""}>${t("common.pass")}</option>
        <option value="0" ${val!=100?"selected":""}>${t("common.fail")}</option>
      </select>
    </div>`;
}

async function saveEval() {
  if (!currentTL) return;
  const body = {
    user_id:          currentTL.id,
    month:            currentTL.month,
    crm_pct:          parseFloat(document.getElementById("f_crm_pct").value)||0,
    reports:          parseInt(document.getElementById("f_reports").value)||0,
    clients_pipeline: parseFloat(document.getElementById("f_clients_pipeline").value)||0,
    attitude:         parseInt(document.getElementById("f_attitude").value)||0,
    presentation:     parseInt(document.getElementById("f_presentation").value)||0,
    behaviour:        parseInt(document.getElementById("f_behaviour").value)||0,
    appearance:       parseInt(document.getElementById("f_appearance").value)||0,
    attendance_pct:   parseFloat(document.getElementById("f_attendance_pct").value)||0,
    hr_roles:         parseInt(document.getElementById("f_hr_roles").value)||0,
    notes:            document.getElementById("f_notes").value||"",
  };
  try {
    await api("/api/kpi/submit/tl-evaluation", { method:"POST", body });
    toast(t("common.saved"), "success");
    closeModal("evalModal");
    loadAll();
  } catch (e) { toastError(e); }
}

function onLangChange() { render(); }

const now = new Date();
document.getElementById("month").value =
  now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
loadAll();
</script>
{% endblock %}
