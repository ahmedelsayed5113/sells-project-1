{% extends "base.html" %}
{% block title %}Teams — Ain KPI{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="teams.title">إدارة الفرق</h1>
    <p class="page-subtitle" data-i18n="teams.subtitle">إنشاء الفرق وتعيين القادة والأعضاء</p>
  </div>
  <button class="btn btn-primary" onclick="openNew()" data-i18n="teams.add">+ فريق جديد</button>
</div>

<div id="teamsList" class="stagger"></div>

<!-- Modal -->
<div class="modal-backdrop" id="teamModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">فريق</div>
      <button class="modal-close" onclick="closeModal('teamModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="error-msg" id="mError"></div>

      <div class="field">
        <label data-i18n="teams.name">اسم الفريق</label>
        <input type="text" id="mName" required>
      </div>
      <div class="field">
        <label data-i18n="teams.description">وصف <small style="color:var(--text-muted)">(اختياري)</small></label>
        <input type="text" id="mDesc">
      </div>
      <div class="field">
        <label data-i18n="teams.leader">التيم ليدر</label>
        <select id="mLeader">
          <option value="" data-i18n="teams.pick_leader">اختر التيم ليدر</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="teams.members">الأعضاء (Sales)</label>
        <div id="membersList" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:6px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveTeam()" data-i18n="teams.save">حفظ الفريق</button>
      <button class="btn btn-ghost" onclick="closeModal('teamModal')" data-i18n="common.cancel">إلغاء</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let teams = [];
let allLeaders = [];
let allSales = [];
let editingId = null;

async function loadAll() {
  try {
    [teams, allLeaders, allSales] = await Promise.all([
      api("/api/teams"),
      api("/api/users?role=team_leader&active_only=true"),
      api("/api/users?role=sales&active_only=true"),
    ]);
    render();
  } catch (e) { toast(e.message, "error"); }
}

function render() {
  const lang = localStorage.getItem("ain_lang") || "ar";
  const container = document.getElementById("teamsList");

  if (!teams.length) {
    container.innerHTML = `<div class="empty-state"><div data-i18n="teams.no_teams">لا توجد فرق بعد</div></div>`;
    applyLang(); return;
  }

  container.innerHTML = teams.map(team => {
    const leaderName = team.leader_name || t("teams.no_leader");
    const cnt = team.member_count || 0;
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-body">
          <div style="display:flex;align-items:center;gap:16px">
            <div style="width:44px;height:44px;border-radius:12px;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;font-size:20px">👥</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:16px">${team.name}</div>
              ${team.description ? `<div class="text-muted" style="font-size:12px">${team.description}</div>` : ""}
              <div style="margin-top:6px;display:flex;gap:16px;font-size:13px">
                <span>
                  <span class="text-muted">${t("teams.leader")}:</span>
                  <strong style="margin-inline-start:4px">${leaderName}</strong>
                </span>
                <span>
                  <span class="text-muted">${t("teams.members")}:</span>
                  <strong style="margin-inline-start:4px">${cnt} ${t("teams.members_count")}</strong>
                </span>
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-sm" onclick="openEdit(${team.id})" data-i18n="common.edit">${t("common.edit")}</button>
              <button class="btn btn-sm btn-danger" onclick="deleteTeam(${team.id})" data-i18n="common.delete">${t("common.delete")}</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join("");
  applyLang();
}

function buildLeaderOptions(selectedId) {
  const sel = document.getElementById("mLeader");
  sel.innerHTML = `<option value="">${t("teams.pick_leader")}</option>` +
    allLeaders.map(u => `<option value="${u.id}" ${u.id == selectedId ? "selected" : ""}>${u.full_name}</option>`).join("");
}

function buildMembersCheckboxes(selectedIds) {
  const box = document.getElementById("membersList");
  if (!allSales.length) {
    box.innerHTML = `<div class="text-muted" style="font-size:13px">لا يوجد Sales متاح</div>`;
    return;
  }
  box.innerHTML = allSales.map(u => `
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
      <input type="checkbox" value="${u.id}" ${selectedIds.includes(u.id) ? "checked" : ""} style="accent-color:var(--accent)">
      <span>${u.full_name}</span>
      <span class="text-muted" style="font-size:11px">@${u.username}</span>
    </label>`).join("");
}

function getCheckedMembers() {
  return [...document.querySelectorAll("#membersList input[type=checkbox]:checked")]
    .map(cb => parseInt(cb.value));
}

async function openNew() {
  editingId = null;
  document.getElementById("modalTitle").textContent = t("teams.add");
  document.getElementById("mName").value = "";
  document.getElementById("mDesc").value = "";
  document.getElementById("mError").classList.remove("show");
  buildLeaderOptions(null);
  buildMembersCheckboxes([]);
  applyLang();
  openModal("teamModal");
}

async function openEdit(teamId) {
  editingId = teamId;
  try {
    const team = await api(`/api/teams/${teamId}`);
    document.getElementById("modalTitle").textContent = team.name;
    document.getElementById("mName").value = team.name;
    document.getElementById("mDesc").value = team.description || "";
    document.getElementById("mError").classList.remove("show");
    buildLeaderOptions(team.leader_id);
    buildMembersCheckboxes((team.members || []).map(m => m.id));
    applyLang();
    openModal("teamModal");
  } catch (e) { toast(e.message, "error"); }
}

async function saveTeam() {
  const name = document.getElementById("mName").value.trim();
  if (!name) {
    const err = document.getElementById("mError");
    err.textContent = t("teams.name") + " مطلوب";
    err.classList.add("show");
    return;
  }

  const body = {
    name,
    description: document.getElementById("mDesc").value.trim(),
    leader_id: parseInt(document.getElementById("mLeader").value) || null,
  };
  const memberIds = getCheckedMembers();

  try {
    let teamId = editingId;
    if (editingId) {
      await api(`/api/teams/${editingId}`, { method: "PUT", body: JSON.stringify(body) });
    } else {
      const res = await api("/api/teams", { method: "POST", body: JSON.stringify(body) });
      teamId = res.id;
    }
    await api(`/api/teams/${teamId}/members`, { method: "PUT", body: JSON.stringify({ member_ids: memberIds }) });
    toast(t("common.saved"), "success");
    closeModal("teamModal");
    loadAll();
  } catch (e) {
    const err = document.getElementById("mError");
    err.textContent = e.message;
    err.classList.add("show");
  }
}

async function deleteTeam(teamId) {
  if (!confirm(t("teams.confirm_delete"))) return;
  try {
    await api(`/api/teams/${teamId}`, { method: "DELETE" });
    toast(t("common.saved"), "success");
    loadAll();
  } catch (e) { toast(e.message, "error"); }
}

function onLangChange() { render(); }

loadAll();
</script>
{% endblock %}
