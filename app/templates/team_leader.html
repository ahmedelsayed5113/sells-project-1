{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="tl.title"></h1>
    <p class="page-subtitle" data-i18n="tl.subtitle"></p>
  </div>
  <div class="flex items-center gap-2">
    <div class="field" style="margin-bottom:0">
      <label data-i18n="common.month"></label>
      <input type="month" id="month" onchange="loadKPI()">
    </div>
    <div id="teamBadge" class="text-muted" style="font-size:12px;font-weight:600"></div>
  </div>
</div>

<div id="noTeam" class="hidden">
  <div class="empty-state">
    <div class="empty-state-icon"><span class="material-symbols-outlined" aria-hidden="true">group_off</span></div>
    <div data-i18n="tl.no_team"></div>
  </div>
</div>

<div id="kpiContent" class="hidden">
  <!-- Score + radar overview -->
  <div class="bento">
    <div class="chart-card span-4">
      <h3 data-i18n="tl.score"></h3>
      <div id="chartScoreGauge" class="plotly-container short"><div class="chart-skel"></div></div>
    </div>
    <div class="chart-card span-4">
      <h3 data-i18n="dash.metric_pillars"></h3>
      <div id="chartScoreRadar" class="plotly-container short"><div class="chart-skel"></div></div>
    </div>
    <div class="chart-card span-4">
      <h3 data-i18n="dash.chart_breakdown"></h3>
      <div id="chartScoreBars" class="plotly-container short"><div class="chart-skel"></div></div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title" data-i18n="tl.auto_section"></div>
    <div id="autoRows"></div>
  </div>

  <div class="form-section">
    <div class="form-section-title" data-i18n="tl.manual_section"></div>
    <div id="manualRows"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
const TL_ID = {{ user.id }};
let cfg = null;
let kpiData = null;

async function init() {
  cfg = await api("/api/kpi/config");
  const now = new Date();
  document.getElementById("month").value =
    now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
  loadKPI();
}

async function loadKPI() {
  const month = document.getElementById("month").value;
  if (!month) return;

  document.getElementById("kpiContent").classList.add("hidden");
  document.getElementById("noTeam").classList.add("hidden");

  try {
    kpiData = await api(`/api/kpi/tl-kpi/${TL_ID}/${month}`);
    render(kpiData);
  } catch (e) {
    if (e.error_code === "no_team_assigned") {
      document.getElementById("noTeam").classList.remove("hidden");
    } else {
      toastError(e);
    }
  }
}

function render(data) {
  const lbl = key => t("kpi." + key);

  // Team badge
  document.getElementById("teamBadge").textContent =
    `${data.team_submitted} ${t("common.of")} ${data.team_size} ${t("tl.team_submitted_of")}`;

  // Score charts
  if (typeof Plotly !== 'undefined') {
    const score = data.total_score || 0;
    Charts.drawGauge("chartScoreGauge", score, { target: 75 });

    const labels = Object.keys(data.breakdown || {}).map(lbl);
    const values = Object.values(data.breakdown || {}).map(v => v.achievement_pct);
    if (labels.length) {
      Charts.drawRadarChart("chartScoreRadar", { labels, values });
      Charts.drawBarChart("chartScoreBars", {
        x: labels,
        y: values,
        colors: values.map(v => Charts.scoreColorHex(v)),
        labels: values.map(v => v.toFixed(0) + "%"),
      }, { xangle: -25 });
    }
  }

  // Auto fields
  const autoKeys = (cfg && cfg.tl_auto_fields) || [];
  document.getElementById("autoRows").innerHTML = autoKeys.map(key => {
    const b = data.breakdown[key];
    if (!b) return "";
    const pct = b.achievement_pct;
    return `
      <div class="kpi-row">
        <div class="kpi-label">${lbl(key)}</div>
        <div class="kpi-bar-wrap">
          <div class="kpi-bar" style="width:${Math.min(pct,100)}%;background:${Charts.scoreColorHex(pct)}"></div>
        </div>
        <div class="kpi-nums">
          <span class="actual">${fmtNum(b.actual)}</span>
          <span class="sep">/</span>
          <span class="target">${fmtNum(b.target)}</span>
          <span class="pct">${pct}%</span>
          <span class="weight">${b.weight}pt → ${b.weighted_score.toFixed(1)}</span>
        </div>
      </div>`;
  }).join("");

  // Manual fields
  const manualKeys = (cfg && cfg.tl_manual_fields) || [];
  const isPending = !data.tl_entry || !data.tl_entry.dataentry_submitted_at;
  document.getElementById("manualRows").innerHTML = isPending
    ? `<div class="status-bar pending"><span class="material-symbols-outlined" aria-hidden="true">hourglass_empty</span><span>${t("tl.pending_eval")}</span></div>`
    : manualKeys.map(key => {
        const b = data.breakdown[key];
        if (!b) return "";
        const pct = b.achievement_pct;
        return `
          <div class="kpi-row">
            <div class="kpi-label">${lbl(key)}</div>
            <div class="kpi-bar-wrap">
              <div class="kpi-bar" style="width:${Math.min(pct,100)}%;background:${Charts.scoreColorHex(pct)}"></div>
            </div>
            <div class="kpi-nums">
              <span class="actual">${fmtNum(b.actual)}</span>
              <span class="sep">/</span>
              <span class="target">${fmtNum(b.target)}</span>
              <span class="pct">${pct}%</span>
              <span class="weight">${b.weight}pt → ${b.weighted_score.toFixed(1)}</span>
            </div>
          </div>`;
      }).join("");

  document.getElementById("kpiContent").classList.remove("hidden");
}

function onLangChange() { loadKPI(); }

function fmtNumLocal(n) {
  if (n === undefined || n === null) return "—";
  return Number.isInteger(n) ? n : n.toFixed(1);
}

init();
</script>
{% endblock %}
